name: Cloud YouTube Crawler (Jules Engine)

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      max_videos:
        description: 'Количество длинных видео'
        required: true
        default: '100'
      max_shorts:
        description: 'Количество Shorts'
        required: true
        default: '100'

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push committed changes back

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Zero-Dependency YouTube Crawler
        run: |
          MAX_VIDEOS="${{ github.event.inputs.max_videos || '100' }}"
          MAX_SHORTS="${{ github.event.inputs.max_shorts || '100' }}"
          echo "Запуск сбора в облаке: $MAX_VIDEOS видео и $MAX_SHORTS shorts"
          python src/knowledge_extractor/youtube_bulk_crawler.py --max-videos $MAX_VIDEOS --max-shorts $MAX_SHORTS

      - name: Commit and Push registry changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scratch/yt_registry.json
          git commit -m "chore: update YouTube registry via cloud crawler [skip ci]" || echo "No changes to commit"
          git push
