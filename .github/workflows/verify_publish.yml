name: "Verify Publishing Pipeline"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          # If any dependencies are needed in the future, list them here
          # pip install -r requirements.txt

      - name: "Run Scraper and Pipeline dry-run validation"
        run: |
          python src/pipeline_orchestrator.py --dry-run
