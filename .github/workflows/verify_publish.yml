name: "Verify Publishing Pipeline"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Compile and Validate Syntax"
        run: |
          python -m py_compile src/knowledge_extractor/botany_bulk_crawler.py src/knowledge_extractor/botany_orchestrator.py src/knowledge_extractor/botany_skills_generator.py src/knowledge_extractor/youtube_bulk_crawler.py src/knowledge_extractor/notebooklm_orchestrator.py src/knowledge_extractor/obsidian_skills_generator.py src/knowledge_extractor/pipeline.py
